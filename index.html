<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First GitHub Page</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<style>
#langBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
  background: black;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}
</style>

</head>
<body>

<!-- Language Button -->
<button id="langBtn" onclick="toggleLanguage()">EN</button>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">My Website</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" id="navHome" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="navAbout" href="About.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="navContact" href="Contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="container my-5">
    <div class="row">
        <div class="col-md-8">
            <h2 id="welcomeTitle">Welcome to My Website!</h2>
            <p id="introText">This is a simple webpage hosted on GitHub Pages.</p>
            <p id="catText">Here's a picture of a cute cat:</p>
            <img src="https://placecats.com/300/200">
            <p class="mt-3">
                <a href="https://github.com" class="btn btn-primary">GitHub</a>
            </p>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" id="cardTitle">Did You Know?</h5>
                    <p class="card-text" id="cardText">
                        GitHub Pages is a free service to host static websites directly from your GitHub repository.
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center">
<p>&copy; 2026 Amelton._.Rams</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

<script>
let currentLang = localStorage.getItem("language") || "en";

const translations = {
  en: {
    navHome: "Home",
    navAbout: "About",
    navContact: "Contact",
    welcomeTitle: "Welcome to My Website!",
    introText: "This is a simple webpage hosted on GitHub Pages.",
    catText: "Here's a picture of a cute cat:",
    cardTitle: "Did You Know?",
    cardText: "GitHub Pages is a free service to host static websites directly from your GitHub repository."
  },
  fr: {
    navHome: "Accueil",
    navAbout: "À propos",
    navContact: "Contact",
    welcomeTitle: "Bienvenue sur mon site!",
    introText: "Ceci est une page web simple hébergée sur GitHub Pages.",
    catText: "Voici une image d'un chat mignon :",
    cardTitle: "Le saviez-vous ?",
    cardText: "GitHub Pages est un service gratuit pour héberger des sites web statiques directement depuis votre dépôt GitHub."
  },
  de: {
    navHome: "Startseite",
    navAbout: "Über uns",
    navContact: "Kontakt",
    welcomeTitle: "Willkommen auf meiner Webseite!",
    introText: "Dies ist eine einfache Webseite, die auf GitHub Pages gehostet wird.",
    catText: "Hier ist ein Bild einer süßen Katze:",
    cardTitle: "Wussten Sie schon?",
    cardText: "GitHub Pages ist ein kostenloser Dienst zum Hosten statischer Websites direkt aus Ihrem GitHub-Repository."
  }
};

function applyLanguage(lang) {
  for (let key in translations[lang]) {
    document.getElementById(key).innerText = translations[lang][key];
  }
  document.getElementById("langBtn").innerText = lang.toUpperCase();
  localStorage.setItem("language", lang);
  currentLang = lang;
}

function toggleLanguage() {
  if (currentLang === "en") {
    applyLanguage("fr");
  } else if (currentLang === "fr") {
    applyLanguage("de");
  } else {
    applyLanguage("en");
  }
}

window.onload = function() {
  applyLanguage(currentLang);
};
</script>

</body>
</html>
