<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<style>
#langBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
  background: black;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}
</style>

</head>
<body>

<!-- Language Button -->
<button id="langBtn" onclick="toggleLanguage()">EN</button>

<header>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav">
<li class="nav-item">
<a class="nav-link" id="navHome" href="index.html">Home</a>
</li>
<li class="nav-item">
<a class="nav-link" id="navAbout" href="About.html">About</a>
</li>
<li class="nav-item">
<a class="nav-link" id="navContact" href="Contact.html">Contact</a>
</li>
</ul>
</div>
</div>
</nav>
</header>

<main class="container my-5">
<h2 id="contactTitle">Contact Me</h2>
<p id="contactText">
If you'd like to get in touch, feel free to email me at

</a>.
</p>
</main>

<footer class="text-center">
<p>&copy; 2026 Amelton._.Rams</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

<script>
let currentLang = localStorage.getItem("language") || "en";

const translations = {
en: {
navHome: "Home",
navAbout: "About",
navContact: "Contact",
contactTitle: "Contact Me",
contactText: "If you'd like to get in touch, feel free to email me at "
},
fr: {
navHome: "Accueil",
navAbout: "À propos",
navContact: "Contact",
contactTitle: "Contactez-moi",
contactText: "Si vous souhaitez me contacter, n'hésitez pas à m'envoyer un email à "
},
de: {
navHome: "Startseite",
navAbout: "Über mich",
navContact: "Kontakt",
contactTitle: "Kontakt",
contactText: "Wenn du mich kontaktieren möchtest, kannst du mir gerne eine E-Mail senden an "
}
};

function applyLanguage(lang) {
for (let key in translations[lang]) {
if(document.getElementById(key)){
document.getElementById(key).innerText = translations[lang][key];
}
}
document.getElementById("langBtn").innerText = lang.toUpperCase();
localStorage.setItem("language", lang);
currentLang = lang;
}

function toggleLanguage() {
if (currentLang === "en") {
applyLanguage("fr");
} else if (currentLang === "fr") {
applyLanguage("de");
} else {
applyLanguage("en");
}
}

window.onload = function() {
applyLanguage(currentLang);
};
</script>

</body>
</html>
